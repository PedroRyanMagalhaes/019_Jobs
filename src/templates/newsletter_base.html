<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>019Jobs</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Courier New', monospace; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);">
    <table width="100%" cellpadding="0" cellspacing="0" style="background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh;">
        <tr>
            <td align="center" style="padding: 60px 20px;">
                
                <!-- Container Principal -->
                <table width="600" cellpadding="0" cellspacing="0" style="background: rgba(26, 26, 46, 0.95); border: 2px solid #ff6ec7; border-radius: 0; box-shadow: 0 0 40px rgba(255, 110, 199, 0.3), 0 0 80px rgba(0, 255, 255, 0.2);">
                    
                    <!-- Header Vaporwave -->
                    <tr>
                        <td style="background: linear-gradient(135deg, #ff6ec7 0%, #7873f5 50%, #00ffff 100%); padding: 40px; text-align: center; position: relative;">
                            <div style="background: rgba(0,0,0,0.3); padding: 20px; border: 1px solid rgba(255,255,255,0.2);">
                                <h1 style="color: #ffffff; margin: 0; font-size: 42px; text-shadow: 0 0 10px #ff6ec7, 0 0 20px #00ffff; letter-spacing: 8px; font-weight: 300;">
                                    019Jobs
                                </h1>
                               
                                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);">
                                    <p style="color: #ffffff; margin: 0; font-size: 14px; letter-spacing: 2px; opacity: 0.8;">
                                        {{ data_hoje }}
                                    </p>
                                    <p style="color: #ff6ec7; margin: 8px 0 0 0; font-size: 16px; letter-spacing: 2px;">
                                        {{ total_vagas }} OPORTUNIDADES
                                    </p>
                                </div>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- Grid de Vagas -->
                    <tr>
                        <td style="padding: 40px 30px; background: rgba(22, 33, 62, 0.5);">
                            
                            {% if total_vagas > 0 %}
                                {% for vaga in vagas %}
                                    {% include 'vaga_card.html' %}
                                {% endfor %}
                            {% else %}
                                <div style="text-align: center; padding: 40px;">
                                    <p style="color: #7873f5; font-size: 18px; letter-spacing: 2px;">
                                        ⚠ NENHUMA VAGA HOJE
                                    </p>
                                    <p style="color: #00ffff; font-size: 12px; letter-spacing: 1px; margin-top: 10px; opacity: 0.6;">
                                        Volte amanhã para novas oportunidades
                                    </p>
                                </div>
                            {% endif %}
                            
                        </td>
                    </tr>
                    
                    <!-- Footer Minimalista -->
                    <tr>
                        <td style="background: rgba(0,0,0,0.5); padding: 30px; text-align: center; border-top: 1px solid rgba(255, 110, 199, 0.3);">
                            <p style="color: #00ffff; font-size: 11px; margin: 0; letter-spacing: 2px; opacity: 0.7;">
                                © 2025 019Jobs • ByPedro
                            </p>
                            <p style="color: #7873f5; font-size: 10px; margin: 15px 0 0 0; letter-spacing: 1px;">
                                <a href="https://seusite.com/cancelar?token={{ token }}" style="color: #7873f5; text-decoration: none; opacity: 0.6;">
                                    [ CANCELAR INSCRIÇÃO ]
                                </a>
                            </p>
                        </td>
                    </tr>
                    
                </table>
                
            </td>
        </tr>
    </table>
</body>
</html>
