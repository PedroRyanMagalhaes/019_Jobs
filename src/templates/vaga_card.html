<div style="background-color: #1a1b26; border-left: 3px solid #bd93f9; margin-bottom: 25px; padding: 25px;">
    
    <h3 style="margin: 0 0 8px 0; color: #f8f8f2; font-size: 18px; font-weight: 600; line-height: 1.4; font-family: 'Courier New', monospace;">
        {{ vaga.titulo }}
    </h3>

    <p style="margin: 0 0 15px 0; color: #8be9fd; font-size: 15px; font-family: 'Courier New', monospace; font-weight: bold;">
        <span style="color: #ffb86c; margin-right: 5px;">></span>{{ vaga.empresa }}
    </p>
    
    <div style="margin-bottom: 20px;">
        <span style="color: #6279c0; font-size: 13px; font-family: 'Courier New', monospace;">
        {{ vaga.localizacao }}
        </span>
        <span style="color: #44475a; margin: 0 8px;"> </span>
        <span style="color: #6279c0; font-size: 13px; font-family: 'Courier New', monospace;">
        {{ vaga.modelo|default('') }} 
        </span>
    </div>
    
    <a href="{{ vaga.link }}" style="display: inline-block; color: #bd93f9; text-decoration: none; font-size: 12px; font-weight: bold; border: 1px solid #bd93f9; padding: 10px 25px; transition: all 0.3s; font-family: 'Courier New', monospace;">
        ABRIR VAGA ->
    </a>
    
</div>
